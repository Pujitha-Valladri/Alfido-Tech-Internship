{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('add') }}" class="btn btn-primary mb-3">Add Item</a>
<ul class="list-group">
  {% for item in items %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ item }}
      <span>
        <a href="{{ url_for('edit', item_id=loop.index0) }}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{{ url_for('delete', item_id=loop.index0) }}" class="btn btn-sm btn-danger">Delete</a>
      </span>
    </li>
  {% endfor %}
</ul>
{% endblock %}
